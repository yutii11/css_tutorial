<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>create mobile payment page design</title>
    <link rel="stylesheet" href="style.css">
</head>
   <body>
       <div class="app-container">
         <div class="top-box">
           <p><span class="left-icon">&#x2190;</span>CHECKOUT<span class="right-icon">&#xb7;</span></p> 
          </div>
          <div class="middle-box">
            <h1>1599<span>$</span></h1>
            <p>pay to xyz company to LTD</p>
          </div>
          <div class="bottom-box">
            <button type="button" class="payment-option-btn">pay with paypal</button>
            <button type="button" class="payment-option-btn">pay using NetBanking</button>
          </div>
          <div class="card-details">
            <p>pay using credit or debit card</p>
            <div class="card-num-field-group">
                <label>card number</label><br
                <input type="text" class="card-num-field" placeholder="xxxx-xxxx-xxxx-xxxx">
            </div>
            <div class="date-field-group">
                <label>Expiry Date</label><br
                <input type="text" class="date-field
                <input type="text" class="yyyy">
                
          </div>
        </div>
    </body>
</html>
