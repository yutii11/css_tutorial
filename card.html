<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div style="max-width:400px;margin:40px auto;padding:24px;border-radius:16px;box-shadow:0 4px 16px rgba(0,0,0,0.12);background:#fff;font-family:'Segoe UI',Arial,sans-serif;">
        <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=400&q=80" alt="Postcard Image" style="width:100%;border-radius:12px 12px 0 0;">
        <div style="padding:16px 0;">
            <h2 style="margin:0 0 8px 0;font-size:1.5rem;color:#333;">Greetings from Paradise</h2>
            <p style="margin:0 0 16px 0;color:#555;font-size:1rem;">
                Wish you were here! The weather is perfect and the scenery is breathtaking. Hope to see you soon.
            </p>
            <div style="display:flex;align-items:center;">
                <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="Sender" style="width:40px;height:40px;border-radius:50%;margin-right:12px;">
                <span style="color:#888;font-size:0.95rem;">John Doe</span>
            </div>
        </div>
    </div>
</body>
</html>
